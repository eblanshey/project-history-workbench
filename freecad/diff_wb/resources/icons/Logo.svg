<!-- File responsibility: Icon for the Diff Workbench in FreeCAD, displayed in the workbench selector panel. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect x="1" y="2" width="30" height="28" rx="3" fill="#212529"/>
  <!-- Left panel (red) -->
  <rect x="3" y="4" width="12" height="24" rx="1" fill="#FF585D" opacity="0.85"/>
  <!-- Right panel (blue) -->
  <rect x="17" y="4" width="12" height="24" rx="1" fill="#418FDE" opacity="0.85"/>
  <!-- Left lines (simulating code) -->
  <rect x="5" y="8" width="7" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="5" y="12" width="5" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="5" y="16" width="8" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="5" y="20" width="4" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <!-- Right lines -->
  <rect x="19" y="8" width="7" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="19" y="12" width="9" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="19" y="16" width="5" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <rect x="19" y="20" width="7" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
  <!-- Center divider -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#FFFFFF" stroke-width="1.5"/>
</svg>
